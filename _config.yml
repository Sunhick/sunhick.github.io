# The Site Configuration
# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: America/Los_Angeles

# jekyll-seo-tag settings
title: Sunil Murthy
tagline: Software Developer & Tech Enthusiast
description: >-
  Software engineer focused on system architecture, security, and distributed systems.

url: "https://sunilmurthy.github.io"
baseurl: ""

github:
  username: sunhick

social:
  name: Sunil Murthy
  email: sunhick@gmail.com
  links:
    - https://github.com/sunhick
    - https://www.linkedin.com/in/sunhick

theme_mode: # [light | dark] — empty follows system preference

avatar: /assets/img/profile.jpg

toc: true

comments:
  provider: # [disqus | utterances | giscus]

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - Makefile

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
